name: CodeQL

# Advisory static analysis of the Python codebase. Results post to the
# repository Security > Code scanning tab; they do not block pull requests.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly, offset from Trivy.
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # Python is interpreted — no compilation step needed.
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
